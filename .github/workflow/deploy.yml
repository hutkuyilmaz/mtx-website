name: Deploy Materix Corporate Landing Page

on:
  push:
    branches: [ main ] # Triggers the compilation pipeline every time you push to main

# Set localized environment permissions securely to eliminate malicious execution
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'

      - name: Install System Dependencies
        run: npm ci

      - name: Execute Static Astro Compilation
        run: npm run build

      - name: Upload Static Web Assets to Cloud Core
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Secure Static Build to Public Vectors
        id: deployment
        uses: actions/deploy-pages@v4